<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06020f"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#7c5cbf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06020f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#d4a82a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06020f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#a67de8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="12" fill="none" stroke="#a67de8" stroke-opacity="0.14" stroke-width="1"/>

  <!-- Badge -->
  <rect x="80" y="80" width="200" height="30" rx="15" fill="#d4a82a" fill-opacity="0.1" stroke="#d4a82a" stroke-opacity="0.35" stroke-width="1"/>
  <circle cx="102" cy="95" r="4" fill="#d4a82a"/>
  <text x="116" y="100" font-family="Georgia, serif" font-size="11" font-weight="700" letter-spacing="2" fill="#d4a82a">FREE &amp; OPEN SOURCE</text>

  <!-- Logo mark -->
  <g transform="translate(80, 145)">
    <!-- Outer hex glow -->
    <circle cx="36" cy="36" r="38" fill="#a67de8" fill-opacity="0.08"/>
    <!-- Lute body shape -->
    <ellipse cx="36" cy="44" rx="18" ry="22" fill="none" stroke="#a67de8" stroke-width="2.5" stroke-opacity="0.9"/>
    <!-- Neck -->
    <rect x="32" y="10" width="8" height="26" rx="4" fill="none" stroke="#a67de8" stroke-width="2.5" stroke-opacity="0.9"/>
    <!-- Strings -->
    <line x1="28" y1="36" x2="44" y2="36" stroke="#d4a82a" stroke-width="1.5" stroke-opacity="0.8"/>
    <line x1="26" y1="44" x2="46" y2="44" stroke="#d4a82a" stroke-width="1.5" stroke-opacity="0.8"/>
    <line x1="28" y1="52" x2="44" y2="52" stroke="#d4a82a" stroke-width="1.5" stroke-opacity="0.8"/>
    <!-- Dot -->
    <circle cx="36" cy="44" r="3" fill="#d4a82a"/>
  </g>

  <!-- Product name -->
  <text x="158" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" letter-spacing="-1" fill="#ede8f8">LuteBox</text>

  <!-- Tagline -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#8078a8">Local Music Manager for Tabletop RPG Sessions</text>

  <!-- Divider line -->
  <line x1="80" y1="275" x2="520" y2="275" stroke="#a67de8" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Feature pills row 1 -->
  <g transform="translate(80, 300)">
    <!-- Pill 1 -->
    <rect width="148" height="36" rx="18" fill="#a67de8" fill-opacity="0.12" stroke="#a67de8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="74" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#c8b8f0">Mood Tagging</text>
    <!-- Pill 2 -->
    <rect x="164" width="168" height="36" rx="18" fill="#a67de8" fill-opacity="0.12" stroke="#a67de8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="248" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#c8b8f0">Download Queue</text>
    <!-- Pill 3 -->
    <rect x="348" width="148" height="36" rx="18" fill="#a67de8" fill-opacity="0.12" stroke="#a67de8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="422" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#c8b8f0">Audio Trim</text>
    <!-- Pill 4 -->
    <rect x="512" width="148" height="36" rx="18" fill="#a67de8" fill-opacity="0.12" stroke="#a67de8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="586" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#c8b8f0">Library Scanner</text>
  </g>

  <!-- Stat blocks -->
  <g transform="translate(80, 390)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#a67de8">0</text>
    <text x="0" y="28" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="2" fill="#8078a8">DEPENDENCIES</text>
    <!-- Stat 2 -->
    <text x="180" y="0" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#a67de8">0</text>
    <text x="180" y="28" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="2" fill="#8078a8">CLOUD CALLS</text>
    <!-- Stat 3 -->
    <text x="360" y="0" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#a67de8">0</text>
    <text x="360" y="28" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="2" fill="#8078a8">ACCOUNTS</text>
    <!-- Stat 4 -->
    <text x="540" y="0" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#d4a82a">MIT</text>
    <text x="540" y="28" font-family="-apple-system, sans-serif" font-size="12" letter-spacing="2" fill="#8078a8">LICENSE</text>
  </g>

  <!-- Right side: terminal mockup -->
  <g transform="translate(760, 80)">
    <rect width="400" height="470" rx="10" fill="#0d0818" stroke="#a67de8" stroke-opacity="0.2" stroke-width="1"/>
    <!-- titlebar -->
    <rect width="400" height="38" rx="10" fill="#120d20"/>
    <rect x="0" y="28" width="400" height="10" fill="#120d20"/>
    <circle cx="20" cy="19" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="19" r="5" fill="#febc2e"/>
    <circle cx="56" cy="19" r="5" fill="#28c840"/>
    <text x="200" y="24" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8078a8">terminal</text>
    <!-- code lines -->
    <text x="20" y="78" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">$ </text>
    <text x="40" y="78" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">git clone</text>
    <text x="20" y="108" font-family="'Courier New', monospace" font-size="11" fill="#6eb86e">  github.com/CallMeKakashi/lutebox</text>
    <text x="20" y="140" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">$ </text>
    <text x="40" y="140" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">npm install</text>
    <text x="20" y="172" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">$ </text>
    <text x="40" y="172" font-family="'Courier New', monospace" font-size="13" fill="#a67de8">node --watch server.js</text>
    <line x1="20" y1="192" x2="380" y2="192" stroke="#a67de8" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="220" font-family="'Courier New', monospace" font-size="13" fill="#5af78e">✔  Server running on port 3000</text>
    <text x="20" y="248" font-family="'Courier New', monospace" font-size="13" fill="#5af78e">✔  Database initialised</text>
    <text x="20" y="276" font-family="'Courier New', monospace" font-size="13" fill="#5af78e">✔  2 scan roots loaded</text>
    <line x1="20" y1="296" x2="380" y2="296" stroke="#a67de8" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="324" font-family="'Courier New', monospace" font-size="12" fill="#8078a8"># Open http://localhost:3000</text>
    <!-- cursor blink -->
    <rect x="20" y="346" width="9" height="18" rx="1" fill="#a67de8" fill-opacity="0.7"/>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8078a8" opacity="0.7">callmekakashi.github.io/lutebox</text>
  <text x="1120" y="560" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8078a8" opacity="0.7">github.com/CallMeKakashi/lutebox</text>
</svg>
